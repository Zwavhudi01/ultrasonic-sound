<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stage 1: Transmitter | Ultrasonic Positioning</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0e27;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #0f172a;
            border-bottom: 1px solid #1e293b;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #ef4444, #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stage-badge {
            background: #ef444420;
            color: #ef4444;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid #ef444440;
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            background: #1e293b;
            color: #e2e8f0;
        }

        .main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            padding: 30px 40px;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        .panel {
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 25px;
        }

        .panel-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #64748b;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .transmitter-visual {
            height: 400px;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .device-core {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 40px #ef444440;
            animation: pulse-core 2s ease-in-out infinite;
        }

        @keyframes pulse-core {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px #ef444440; }
            50% { transform: scale(1.05); box-shadow: 0 0 60px #ef444460; }
        }

        .wave-ring {
            position: absolute;
            border: 2px solid #ef4444;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }

        .wave-ring.active {
            animation: wave-expand 1.5s ease-out forwards;
        }

        @keyframes wave-expand {
            0% { width: 80px; height: 80px; opacity: 0.6; }
            100% { width: 400px; height: 400px; opacity: 0; }
        }

        .broadcast-status {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #64748b;
            border: 1px solid #1e293b;
        }

        .broadcast-status.sending {
            color: #ef4444;
            border-color: #ef444440;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #ef4444;
        }

        .code-display {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            letter-spacing: 0.3em;
            color: #ef4444;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px #ef444440;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
        }

        .btn-secondary:hover {
            background: #334155;
            color: #e2e8f0;
        }

        .auto-controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .auto-controls .btn {
            flex: 1;
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .stat-item {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ef4444;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
        }

        .log-feed {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .log-item {
            padding: 10px 12px;
            background: #1e293b;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.8rem;
            border-left: 3px solid #ef4444;
            animation: slideIn 0.3s ease-out;
        }

        .log-time {
            color: #64748b;
            font-size: 0.7rem;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #64748b;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: blink 2s infinite;
        }

        .status-dot.idle {
            background: #64748b;
            animation: none;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @media (max-width: 1024px) {
            .main { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 15px; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <header class="header">
        <h1>📢 Stage 1: Transmitter</h1>
        <div style="display: flex; align-items: center; gap: 20px;">
            <span class="stage-badge">DEVICE A</span>
            <nav class="nav-links">
                <a href="transmitter.html" class="active">Transmitter</a>
                <a href="receiver.html">Receiver</a>
                <a href="admin.html">Admin</a>
            </nav>
        </div>
    </header>

    <main class="main">
        <div>
            <div class="panel">
                <div class="panel-title">📡 Broadcast Visualization</div>
                <div class="transmitter-visual" id="visualContainer">
                    <div class="wave-ring" id="wave1"></div>
                    <div class="wave-ring" id="wave2"></div>
                    <div class="wave-ring" id="wave3"></div>
                    <div class="device-core" id="deviceCore">📢</div>
                    <div class="broadcast-status" id="broadcastStatus">
                        <span class="status-dot idle" id="statusDot"></span>
                        <span id="statusText">Ready to broadcast</span>
                    </div>
                </div>
            </div>

            <div class="panel" style="margin-top: 20px;">
                <div class="panel-title">📊 Transmission Log</div>
                <div class="log-feed" id="transmissionLog">
                    <div style="color: #64748b; text-align: center; padding: 20px;">No transmissions yet</div>
                </div>
            </div>
        </div>

        <div>
            <div class="panel">
                <div class="panel-title">⚙️ Signal Configuration</div>

                <div class="form-group">
                    <label>Target Pattern Code</label>
                    <div class="code-display" id="patternDisplay">12345</div>
                </div>

                <div class="form-group">
                    <label>Signal Code</label>
                    <input type="text" id="signalCode" value="12345" maxlength="10" placeholder="Enter code...">
                </div>

                <div class="form-group">
                    <label>Transmitter Location</label>
                    <input type="text" id="txLocation" value="Building A, Floor 3, Room 301" placeholder="Enter location...">
                </div>

                <div class="form-group">
                    <label>Account / User ID</label>
                    <input type="text" id="txUserId" value="TX-001-ADMIN" placeholder="Enter user ID...">
                </div>

                <div class="form-group">
                    <label>Signal Strength</label>
                    <select id="txStrength">
                        <option value="low">Low (Short Range)</option>
                        <option value="medium" selected>Medium (Standard)</option>
                        <option value="high">High (Extended Range)</option>
                    </select>
                </div>

                <button class="btn btn-primary" id="sendBtn" onclick="sendSignal()">
                    📡 Send Signal Now
                </button>

                <div class="auto-controls">
                    <button class="btn btn-secondary" id="autoBtn" onclick="toggleAuto()">
                        ▶️ Auto Send
                    </button>
                    <button class="btn btn-secondary" onclick="clearLog()">
                        🗑️ Clear
                    </button>
                </div>

                <div class="stats-row">
                    <div class="stat-item">
                        <div class="stat-value" id="sentCount">0</div>
                        <div class="stat-label">Signals Sent</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="autoStatus">OFF</div>
                        <div class="stat-label">Auto Mode</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="shared-state.js"></script>
    <script>
        let sentCount = 0;
        let autoInterval = null;
        let isAutoSending = false;

        function sendSignal() {
            const code = document.getElementById('signalCode').value.trim() || '12345';
            const location = document.getElementById('txLocation').value.trim();
            const userId = document.getElementById('txUserId').value.trim();
            const strength = document.getElementById('txStrength').value;

            const signal = {
                type: SIGNAL_TYPES.PING,
                code: code,
                pattern: TARGET_PATTERN,
                location: location,
                userId: userId,
                strength: strength,
                source: 'Device-A',
                sourceType: 'transmitter'
            };

            sharedState.broadcast(signal);

            sentCount++;
            document.getElementById('sentCount').textContent = sentCount;

            animateTransmission();
            addToLog(signal);
            updateStatus('Signal broadcasted', true);
        }

        function animateTransmission() {
            const container = document.getElementById('visualContainer');
            const rings = container.querySelectorAll('.wave-ring');

            rings.forEach((ring, i) => {
                setTimeout(() => {
                    ring.classList.remove('active');
                    void ring.offsetWidth;
                    ring.classList.add('active');
                }, i * 200);
            });

            const core = document.getElementById('deviceCore');
            core.style.animation = 'none';
            void core.offsetWidth;
            core.style.animation = 'pulse-core 0.5s ease-in-out 3';
        }

        function addToLog(signal) {
            const logFeed = document.getElementById('transmissionLog');
            const time = new Date().toLocaleTimeString();

            const item = document.createElement('div');
            item.className = 'log-item';
            item.innerHTML = `
                <div class="log-time">${time}</div>
                <div><strong>Code:</strong> ${signal.code} | <strong>Pattern:</strong> ${signal.pattern}</div>
                <div style="color: #94a3b8; margin-top: 4px;">${signal.location}</div>
            `;

            if (logFeed.children.length === 1 && logFeed.children[0].textContent.includes('No transmissions')) {
                logFeed.innerHTML = '';
            }

            logFeed.insertBefore(item, logFeed.firstChild);

            if (logFeed.children.length > 20) {
                logFeed.removeChild(logFeed.lastChild);
            }
        }

        function updateStatus(text, active) {
            const dot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const statusEl = document.getElementById('broadcastStatus');

            dot.className = active ? 'status-dot' : 'status-dot idle';
            statusText.textContent = text;
            statusEl.className = 'broadcast-status' + (active ? ' sending' : '');

            if (active) {
                setTimeout(() => updateStatus('Ready to broadcast', false), 2000);
            }
        }

        function toggleAuto() {
            const btn = document.getElementById('autoBtn');

            if (isAutoSending) {
                clearInterval(autoInterval);
                isAutoSending = false;
                btn.innerHTML = '▶️ Auto Send';
                document.getElementById('autoStatus').textContent = 'OFF';
                document.getElementById('autoStatus').style.color = '#64748b';
            } else {
                sendSignal();
                autoInterval = setInterval(sendSignal, 3000);
                isAutoSending = true;
                btn.innerHTML = '⏹️ Stop Auto';
                document.getElementById('autoStatus').textContent = 'ON';
                document.getElementById('autoStatus').style.color = '#22c55e';
            }
        }

        function clearLog() {
            document.getElementById('transmissionLog').innerHTML = '<div style="color: #64748b; text-align: center; padding: 20px;">No transmissions yet</div>';
            sentCount = 0;
            document.getElementById('sentCount').textContent = '0';
        }

        sharedState.subscribe((data) => {
            if (data.type === SIGNAL_TYPES.ADMIN_UPDATE) {
                updateStatus('Admin received signal', true);
            }
        });
    </script>
</body>
</html>
